<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Online Exam</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563eb; 
  --secondary: #f59e0b;
  --bg: #0f1322; --surface: #161c36; --surf2: #1e2647;
  --border: #2a3558; --text: #e8ecf8; --muted: #6e7aa0;
  --gold: #ffc107; --danger: #ff5252; --success: #00e676;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* Header & Timer */
.top-bar { background: var(--surface); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
.top-info { display: flex; flex-direction: column; }
.t-app { font-weight: 800; font-size: 16px; color: var(--gold); display: flex; align-items: center; gap: 6px; }
.t-subj { font-size: 12px; color: var(--muted); }
.timer { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 700; color: var(--gold); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; background: rgba(255,193,7,0.05); }
.timer.danger { color: var(--danger); border-color: var(--danger); background: rgba(255,82,82,0.1); animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

/* Main Area */
.main-area { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }

/* Setup & Selection */
.setup-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center; margin-top: 20vh; box-shadow: 0 10px 30px rgba(0,0,0,0.3);}
.select-subj { width: 100%; padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Sarabun'; font-size: 16px; margin: 20px 0; outline: none; }
.btn { width: 100%; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-gold { background: var(--gold); color: #000; }
.btn:active { transform: scale(0.96); }

/* Question Area */
.q-progress { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.q-dot { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 1px solid var(--border); color: var(--muted); background: var(--surface); cursor: pointer; transition: 0.2s;}
.q-dot.active { border-color: var(--primary); color: var(--primary); border-width: 2px; }
.q-dot.answered { background: rgba(37,99,235,0.1); border-color: var(--primary); color: var(--text); }

.q-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.q-num { font-size: 12px; color: var(--muted); font-weight: 700; margin-bottom: 8px; }
.q-text { font-size: 18px; font-weight: 600; line-height: 1.5; color: var(--text); }

.choices { display: flex; flex-direction: column; gap: 12px; }
.choice-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 15px; align-items: center; cursor: pointer; transition: 0.2s; color: var(--text); text-align: left;}
.choice-btn.selected { border-color: var(--gold); background: rgba(255,193,7,0.1); }
.c-label { font-family: 'IBM Plex Mono'; font-weight: 800; background: var(--surf2); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; }
.choice-btn.selected .c-label { background: var(--gold); color: #000; }
.c-text { font-family: 'Sarabun'; font-size: 15px; line-height: 1.4; }

.controls { display: flex; justify-content: space-between; margin-top: auto; gap: 10px; padding: 20px; background: var(--bg); position: sticky; bottom: 0; border-top: 1px solid var(--border);}

/* Loaders & Overlays */
.ov { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
.spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }

/* 🌟 NEW: Custom Modal CSS (Native Look) */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 60px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.ca-btn-group { display: flex; gap: 12px; justify-content: center; }
.ca-btn { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.ca-btn-cancel { background: var(--surf2); border: 1px solid var(--border); color: var(--text); }
.ca-btn-confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
.ca-btn:active { transform: scale(0.96); }

/* Result Page */
.res-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px 20px; text-align: center; margin-bottom: 20px; }
.res-score { font-family: 'IBM Plex Mono'; font-size: 60px; font-weight: 800; color: var(--gold); line-height: 1; margin: 15px 0; text-shadow: 0 0 20px rgba(255,193,7,0.3); }
.ans-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; text-align: left; }
.ans-card.correct { border-left: 4px solid var(--success); }
.ans-card.wrong { border-left: 4px solid var(--danger); }
</style>
</head>
<body>

<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div style="font-weight:700; color:var(--text);">กำลังเตรียมระบบสอบ...</div>
</div>

<!-- 🌟 NEW: Custom Modal HTML -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <div id="ca-btn-group" class="ca-btn-group"></div>
  </div>
</div>

<!-- Setup Screen -->
<div id="ui-setup" class="main-area hidden">
  <div class="setup-box">
    <div style="font-size: 50px; margin-bottom: 10px;">📋</div>
    <h2 style="color:var(--text); margin-bottom: 5px;">เลือกวิชาที่ต้องการสอบ</h2>
    <div style="font-size:13px; color:var(--muted);">โปรดอ่านคำถามให้ละเอียดก่อนตอบ</div>
    
    <select id="inp-subject" class="select-subj">
      <option value="">กำลังโหลดวิชา...</option>
    </select>
    
    <button class="btn btn-primary" onclick="startExam()">เริ่มทำแบบทดสอบ</button>
    <button class="btn" style="background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:15px;" onclick="liff.closeWindow()">กลับสู่หน้าหลัก</button>
  </div>
</div>

<!-- Exam Screen -->
<div id="ui-exam" class="hidden" style="display: flex; flex-direction: column; height: 100vh;">
  <div class="top-bar">
    <div class="top-info">
      <div class="t-app">📋 <span class="dynamic-app-name">System</span></div>
      <div class="t-subj" id="t-subj-name">วิชา: -</div>
    </div>
    <div class="timer" id="timer">--:--</div>
  </div>
  
  <div class="main-area">
    <div class="q-progress" id="q-dots"></div>
    <div class="q-box">
      <div class="q-num" id="q-label">ข้อ 1 จาก 10</div>
      <div class="q-text" id="q-text">โหลดคำถาม...</div>
    </div>
    <div class="choices">
      <div class="choice-btn" id="c-A" onclick="selectChoice('A')"><div class="c-label">A</div><div class="c-text" id="t-A">-</div></div>
      <div class="choice-btn" id="c-B" onclick="selectChoice('B')"><div class="c-label">B</div><div class="c-text" id="t-B">-</div></div>
      <div class="choice-btn" id="c-C" onclick="selectChoice('C')"><div class="c-label">C</div><div class="c-text" id="t-C">-</div></div>
      <div class="choice-btn" id="c-D" onclick="selectChoice('D')"><div class="c-label">D</div><div class="c-text" id="t-D">-</div></div>
    </div>
  </div>
  
  <div class="controls">
    <button class="btn" style="background:var(--surface); border:1px solid var(--border); color:var(--text); width: 60px;" onclick="prevQ()">←</button>
    <button class="btn btn-gold" style="flex:1;" onclick="confirmSubmit()">📤 ส่งข้อสอบ</button>
    <button class="btn" style="background:var(--surface); border:1px solid var(--border); color:var(--text); width: 60px;" onclick="nextQ()">→</button>
  </div>
</div>

<!-- Result Screen -->
<div id="ui-result" class="main-area hidden">
  <div class="res-card">
    <div style="font-size: 50px;">🎉</div>
    <h2 style="margin-top: 10px;">ส่งข้อสอบสำเร็จ!</h2>
    <div class="res-score"><span id="r-score">0</span>/<span id="r-max">0</span></div>
    <div style="color:var(--muted); font-size:14px;">คะแนนคิดเป็น <span id="r-pct" style="color:var(--text); font-weight:700;">0%</span></div>
  </div>
  
  <h3 style="font-size: 16px; margin: 20px 0 10px;">สรุปผลและเฉลย</h3>
  <div id="r-list"></div>
  
  <button class="btn btn-primary" style="margin-top:20px;" onclick="liff.closeWindow()">กลับสู่หน้าแชท</button>
</div>

<script>
const LIFF_ID = '2009896605-Wd1uqyvU';   
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwo_kB4DZSVmYqkztnf8n_-sjVvAFUxIH9dZAqby_SUvV5H8gH5hXhILHkzZJ59S2j6/exec'; 

let userId = '';
let allSubjects = [];
let questions = [];
let answers = {};
let currentQ = 0;
let timeLeft = 0;
let timerInt = null;
let submitted = false;
let selectedSubject = '';
let alerted5Min = false; // 🌟 เพิ่มตัวแปรสำหรับเช็กสถานะการเตือน 5 นาที

// 🌟 NEW: ฟังก์ชันสร้างเสียงแจ้งเตือน (Web Audio API) แบบไม่ต้องใช้ไฟล์ภายนอก
function playNotificationSound() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    
    function playTone(freq, startTime) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, startTime);
      gain.gain.setValueAtTime(0.3, startTime); // ความดัง
      gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.5); // ค่อยๆ เบาลง
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + 0.5);
    }
    
    // เล่นเสียง 2 จังหวะ (ติ๊ง-ต่อง)
    playTone(880, ctx.currentTime);          // โน้ตตัวที่ 1
    playTone(1108.73, ctx.currentTime + 0.15); // โน้ตตัวที่ 2
  } catch (e) {
    console.log("อุปกรณ์ไม่รองรับการเล่นเสียง");
  }
}

// 🌟 NEW: Custom Modal Functions
function customAlert(msg, title="แจ้งเตือน", icon="⚠️") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `<button class="ca-btn ca-btn-confirm" onclick="closeCustomAlert()">ตกลง</button>`;
  document.getElementById('custom-alert').classList.add('active');
}
function closeCustomAlert() { document.getElementById('custom-alert').classList.remove('active'); }

let confirmCallback = null;
function customConfirm(msg, callback, title="ยืนยัน", icon="❓", btnClass="ca-btn-confirm") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `
    <button class="ca-btn ca-btn-cancel" onclick="closeCustomAlert()">ยกเลิก</button>
    <button class="ca-btn ${btnClass}" id="btn-ca-ok">ตกลง</button>
  `;
  confirmCallback = callback;
  document.getElementById('btn-ca-ok').onclick = () => { closeCustomAlert(); if(confirmCallback) confirmCallback(); };
  document.getElementById('custom-alert').classList.add('active');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    userId = (await liff.getProfile()).userId;
    
    const res = await callAPI('GET', { action: 'get_subjects', userId: userId });
    if(res.status === 'ok') {
      if(res.config) { document.querySelectorAll('.dynamic-app-name').forEach(el => el.textContent = res.config.appName); }
      
      allSubjects = res.subjects || [];
      const completed = res.completedSubjects || [];
      const sel = document.getElementById('inp-subject');
      sel.innerHTML = '<option value="">-- เลือกวิชา --</option>';
      
      let hasAvailable = false;
      allSubjects.forEach(s => {
        if(completed.includes(s.name)) {
          sel.innerHTML += `<option value="${s.name}" disabled>✅ ${s.name} (สอบผ่านแล้ว)</option>`;
        } else {
          sel.innerHTML += `<option value="${s.name}">${s.name} (${s.count} ข้อ)</option>`;
          hasAvailable = true;
        }
      });
      
      if(!hasAvailable) sel.innerHTML = '<option value="">🎉 คุณสอบครบทุกวิชาแล้ว</option>';
      
      timeLeft = (res.examTimeMinutes || 20) * 60;
      document.getElementById('ov-load').classList.add('hidden');
      document.getElementById('ui-setup').classList.remove('hidden');
    } else {
      customAlert(res.message, 'เกิดข้อผิดพลาด', '❌');
    }
  } catch(e) {
    customAlert(e.message, 'Init Error', '❌');
  }
}

async function startExam() {
  selectedSubject = document.getElementById('inp-subject').value;
  if(!selectedSubject) return customAlert('กรุณาเลือกวิชาที่จะสอบก่อนครับ', 'แจ้งเตือน', '⚠️');
  
  document.getElementById('ov-load').classList.remove('hidden');
  try {
    const res = await callAPI('GET', { action: 'get_questions', userId: userId, subject: selectedSubject });
    if(res.status === 'ok') {
      questions = res.questions || [];
      if(questions.length === 0) throw new Error('ไม่พบข้อสอบในวิชานี้');
      
      // Auto-save State Restoration
      const saved = localStorage.getItem(`exam_${userId}_${selectedSubject}`);
      if(saved) {
        try {
          const parsed = JSON.parse(saved);
          answers = parsed.ans || {};
          timeLeft = parsed.time || timeLeft;
        } catch(e){}
      }

      // 🌟 ดักไว้เพื่อไม่ให้แจ้งเตือนซ้ำ หากเน็ตหลุดแล้วกลับมาตอนเวลาเหลือน้อยกว่า 5 นาที
      if (timeLeft <= 300) alerted5Min = true; 
      
      document.getElementById('t-subj-name').textContent = `วิชา: ${selectedSubject}`;
      document.getElementById('ov-load').classList.add('hidden');
      document.getElementById('ui-setup').classList.add('hidden');
      document.getElementById('ui-exam').classList.remove('hidden');
      
      renderDots();
      renderQuestion(0);
      startTimer();
    } else { throw new Error(res.message); }
  } catch(e) {
    document.getElementById('ov-load').classList.add('hidden');
    customAlert(e.message, 'ผิดพลาด', '❌');
  }
}

function renderDots() {
  let html = '';
  for(let i=0; i<questions.length; i++) {
    const isAns = answers[questions[i].questionId] ? 'answered' : '';
    const isAct = i === currentQ ? 'active' : '';
    html += `<div class="q-dot ${isAns} ${isAct}" onclick="goToQ(${i})">${i+1}</div>`;
  }
  document.getElementById('q-dots').innerHTML = html;
}

function renderQuestion(idx) {
  currentQ = idx;
  const q = questions[idx];
  document.getElementById('q-label').textContent = `วิชา: ${selectedSubject} • ข้อ ${idx+1} จาก ${questions.length}`;
  document.getElementById('q-text').textContent = q.questionText;
  
  const savedAns = answers[q.questionId];
  ['A','B','C','D'].forEach(k => {
    const btn = document.getElementById(`c-${k}`);
    document.getElementById(`t-${k}`).textContent = q.choices[k] || '-';
    if(q.choices[k]) {
      btn.style.display = 'flex';
      btn.className = `choice-btn ${savedAns === k ? 'selected' : ''}`;
    } else {
      btn.style.display = 'none';
    }
  });
  renderDots();
}

function selectChoice(ans) {
  answers[questions[currentQ].questionId] = ans;
  saveState();
  renderQuestion(currentQ);
  setTimeout(() => { if(currentQ < questions.length - 1) nextQ(); }, 300);
}

function prevQ() { if(currentQ > 0) renderQuestion(currentQ - 1); }
function nextQ() { if(currentQ < questions.length - 1) renderQuestion(currentQ + 1); }
function goToQ(i) { renderQuestion(i); }

function saveState() {
  localStorage.setItem(`exam_${userId}_${selectedSubject}`, JSON.stringify({ ans: answers, time: timeLeft }));
}

function startTimer() {
  timerInt = setInterval(() => {
    timeLeft--;
    if(timeLeft % 5 === 0) saveState();
    
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    const el = document.getElementById('timer');
    el.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    
    // 🌟 เพิ่มป๊อปอัปและ "เสียงแจ้งเตือน" เมื่อเวลาเหลือ 5 นาที (300 วินาที)
    if(timeLeft === 300 && !alerted5Min) {
      alerted5Min = true;
      playNotificationSound(); // 🔔 สั่งเล่นเสียง "ติ๊ง-ต่อง"
      customAlert('เหลือเวลาทำข้อสอบอีก 5 นาทีสุดท้าย กรุณาตรวจสอบคำตอบนะครับ!', 'แจ้งเตือนเวลา', '⏳');
    }
    
    // แจ้งเตือนกระพริบสีแดงเมื่อเหลือ 1 นาที
    if(timeLeft <= 60) el.classList.add('danger');
    
    if(timeLeft <= 0) {
      clearInterval(timerInt);
      playNotificationSound(); // 🔔 เล่นเสียงตอนหมดเวลาด้วยก็ได้
      // 🌟 ใช้ Custom Alert เมื่อหมดเวลา
      customAlert('หมดเวลาทำข้อสอบ ระบบกำลังส่งคำตอบอัตโนมัติ', 'หมดเวลา!', '⏰');
      setTimeout(() => { submitExam(true); }, 2000);
    }
  }, 1000);
}

function confirmSubmit() {
  const unanswered = questions.length - Object.keys(answers).length;
  if(unanswered > 0) {
    // 🌟 ใช้ Custom Confirm สีแดงสำหรับเตือนว่าทำไม่ครบ
    customConfirm(`ยังมีข้อที่ไม่ได้ตอบอีก <strong style="color:var(--danger)">${unanswered} ข้อ</strong><br>ยืนยันการส่งข้อสอบหรือไม่?`, () => {
      submitExam(false);
    }, 'แจ้งเตือน', '⚠️', 'ca-btn-danger');
  } else {
    // 🌟 ใช้ Custom Confirm แบบปกติ
    customConfirm(`ท่านทำข้อสอบครบแล้ว<br>ยืนยันการส่งข้อสอบใช่หรือไม่?`, () => {
      submitExam(false);
    }, 'ส่งข้อสอบ', '📤');
  }
}

async function submitExam(isTimeout) {
  if(submitted) return; submitted = true;
  clearInterval(timerInt);
  document.getElementById('ov-load').classList.remove('hidden');
  
  try {
    const res = await callAPI('POST', { action: 'submit_exam', userId: userId, subject: selectedSubject, answers: answers });
    if(res.status === 'ok') {
      localStorage.removeItem(`exam_${userId}_${selectedSubject}`);
      
      document.getElementById('r-score').textContent = res.totalScore;
      document.getElementById('r-max').textContent = res.maxScore;
      document.getElementById('r-pct').textContent = res.percentage + '%';
      
      let resHtml = '';
      res.results.forEach((r, i) => {
        // ค้นหาโจทย์ข้อนี้จาก Array เพื่อดึงข้อความของช้อยส์
        const q = questions.find(q => q.questionId === r.qid);
        const qText = q?.questionText || '-';
        
        // ดึงข้อความคำตอบของผู้ใช้
        const userAnsLetter = r.userAnswer || '-';
        const userAnsText = (q && q.choices && q.choices[userAnsLetter]) ? q.choices[userAnsLetter] : '';
        const displayUserAns = userAnsText ? `${userAnsLetter}: ${userAnsText}` : (userAnsLetter === '-' ? 'ไม่ได้ตอบ' : userAnsLetter);
        
        // ดึงข้อความเฉลยที่ถูกต้อง
        const correctLetter = r.correct || '-';
        const correctText = (q && q.choices && q.choices[correctLetter]) ? q.choices[correctLetter] : '';
        const displayCorrect = correctText ? `${correctLetter}: ${correctText}` : correctLetter;
        
        resHtml += `
          <div class="ans-card ${r.isCorrect ? 'correct' : 'wrong'}">
            <div style="font-size:12px; font-weight:700; color:var(--muted); margin-bottom:4px;">ข้อ ${i+1}</div>
            <div style="font-size:14px; font-weight:600; margin-bottom:8px;">${qText}</div>
            <div style="font-size:13px; color:var(--text); margin-bottom:2px;">คำตอบคุณ: <b>${displayUserAns}</b></div>
            <div style="font-size:13px; color:${r.isCorrect ? 'var(--success)' : 'var(--danger)'};">เฉลย: <b>${displayCorrect}</b></div>
          </div>
        `;
      });
      document.getElementById('r-list').innerHTML = resHtml;
      
      document.getElementById('ov-load').classList.add('hidden');
      document.getElementById('ui-exam').style.display = 'none';
      document.getElementById('ui-result').classList.remove('hidden');
    } else { throw new Error(res.message); }
  } catch(e) {
    submitted = false;
    document.getElementById('ov-load').classList.add('hidden');
    customAlert(e.message, 'ส่งข้อสอบไม่สำเร็จ', '❌');
  }
}

async function callAPI(method, params) {
  let url = GAS_URL, opts = { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(params) };
  if(method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts = {method:'GET'}; }
  const resp = await fetch(url, opts);
  return await resp.json();
}

init();
</script>
