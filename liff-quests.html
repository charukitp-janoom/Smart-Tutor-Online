<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Quests</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563eb; --secondary: #f59e0b;
  --bg: #0f1322; --surface: #161c36; --surf2: #1e2647;
  --border: #2a3558; --text: #e8ecf8; --muted: #6e7aa0;
  --green: #00c853;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; padding: 20px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.title { font-size: 24px; font-weight: 800; color: var(--text); }
.coin-box { background: var(--surf2); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; font-weight: 800; color: var(--secondary); font-family: 'IBM Plex Mono'; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}

.quest-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
.q-title { font-size: 16px; font-weight: 800; margin-bottom: 5px; }
.q-reward { font-size: 14px; color: var(--secondary); font-weight: 700; margin-bottom: 15px; }

.progress-bar { width: 100%; height: 8px; background: var(--surf2); border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: width 0.3s; }
.progress-text { font-size: 12px; color: var(--muted); text-align: right; }

.btn { width: 100%; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; margin-top: 15px; }
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-disabled { background: var(--surf2); color: var(--muted); pointer-events: none; }
.btn-success { background: rgba(0,200,83,0.1); color: var(--green); border: 1px solid rgba(0,200,83,0.3); pointer-events: none; }

.ov { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
.hidden { display: none !important; }
.spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;}
@keyframes spin { to { transform: rotate(360deg); } }

/* --- Custom Modal CSS --- */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-ov.active { opacity: 1; pointer-events: auto; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.modal-ov.active .modal-box { transform: scale(1); }
.modal-icon { font-size: 60px; margin-bottom: 15px; line-height: 1; }
.modal-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
.modal-msg { font-size: 15px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.modal-btn-group { display: flex; gap: 12px; justify-content: center; }
.modal-btn { flex: 1; padding: 14px 0; border-radius: 12px; font-size: 16px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.modal-btn-confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
.modal-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div style="font-weight:800;">กำลังโหลดภารกิจ...</div>
</div>

<div id="custom-modal" class="modal-ov">
  <div class="modal-box">
    <div id="modal-icon" class="modal-icon">✅</div>
    <div id="modal-title" class="modal-title">สำเร็จ</div>
    <div id="modal-msg" class="modal-msg">ข้อความ</div>
    <div id="modal-btn-group" class="modal-btn-group"></div>
  </div>
</div>

<div class="header">
  <div class="title">🎯 ภารกิจประจำวัน</div>
  <div class="coin-box">🪙 <span id="u-coin">0</span></div>
</div>

<div id="quest-list"></div>

<button class="btn" style="background:transparent; border: 1px solid var(--border); color:var(--muted); margin-top:20px;" onclick="liff.closeWindow()">← กลับสู่หน้าหลัก</button>

<script>
const LIFF_ID = '2009896605-dxypaod6'; 
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwo_kB4DZSVmYqkztnf8n_-sjVvAFUxIH9dZAqby_SUvV5H8gH5hXhILHkzZJ59S2j6/exec';

let userId = '';

// --- Modal Functions ---
function showModal(icon, title, msg) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').innerHTML = msg;
  
  document.getElementById('modal-btn-group').innerHTML = `
    <button class="modal-btn modal-btn-confirm" onclick="closeModal()">ตกลง</button>
  `;
  document.getElementById('custom-modal').classList.add('active');
}
function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    const configRes = await callAPI('GET', { action: 'get_config' });
    if(configRes.status === 'ok') { 
      document.documentElement.style.setProperty('--primary', configRes.config.colorPrimary);
      document.documentElement.style.setProperty('--secondary', configRes.config.colorSecondary);
    }
    
    userId = (await liff.getProfile()).userId;
    loadQuests();
  } catch(e) {
    showModal('❌', 'ผิดพลาด', e.message);
  }
}

async function loadQuests() {
  try {
    const res = await callAPI('GET', { action: 'get_quests', userId: userId });
    if(res.status === 'ok') {
      document.getElementById('u-coin').textContent = res.balance || 0;
      renderQuests(res.quests);
      document.getElementById('ov-load').classList.add('hidden');
    } else { showModal('❌', 'เกิดข้อผิดพลาด', res.message); }
  } catch(e) { showModal('❌', 'การเชื่อมต่อขัดข้อง', e.message); }
}

function renderQuests(quests) {
  const list = document.getElementById('quest-list');
  list.innerHTML = '';
  
  if(!quests || quests.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted);">ยังไม่มีภารกิจในวันนี้</div>';
    return;
  }
  
  quests.forEach(q => {
    const pct = (q.current / q.target) * 100;
    let btnHtml = '';
    
    if(q.isClaimed) {
      btnHtml = `<button class="btn btn-success">✅ รับรางวัลแล้ว</button>`;
    } else if(q.isCompleted) {
      btnHtml = `<button class="btn btn-primary" id="btn-claim-${q.id}" onclick="claimQuest('${q.id}')">🎁 กดรับรางวัล</button>`;
    } else {
      btnHtml = `<button class="btn btn-disabled">ยังไม่สำเร็จ</button>`;
    }
    
    list.innerHTML += `
      <div class="quest-card">
        <div class="q-title">${q.title}</div>
        <div class="q-reward">+${q.reward} Point</div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
        <div class="progress-text">${q.current} / ${q.target}</div>
        ${btnHtml}
      </div>
    `;
  });
}

async function claimQuest(qId) {
  const btn = document.getElementById(`btn-claim-${qId}`);
  btn.textContent = 'กำลังตรวจสอบ...'; btn.disabled = true;
  
  try {
    const res = await callAPI('POST', { action: 'claim_quest', userId: userId, questId: qId });
    if(res.status === 'ok') {
      document.getElementById('u-coin').textContent = res.balance;
      // ✅ ใช้ Custom Modal โชว์ความสำเร็จที่สวยงามแทน
      showModal('✅', 'สำเร็จ!', res.message);
      loadQuests(); // รีโหลดอัปเดตปุ่ม
    } else {
      showModal('❌', 'รับรางวัลไม่ได้', res.message);
      btn.textContent = '🎁 กดรับรางวัล'; btn.disabled = false;
    }
  } catch(e) {
    showModal('❌', 'ผิดพลาด', 'การเชื่อมต่อขัดข้อง');
    btn.textContent = '🎁 กดรับรางวัล'; btn.disabled = false;
  }
}

async function callAPI(method, params) {
  let url = GAS_URL, opts = { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(params) };
  if(method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts = {method:'GET'}; }
  const resp = await fetch(url, opts);
  return await resp.json();
}

init();
</script>
</body>
</html>
