<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reward Store</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #f59e0b; 
  --secondary: #d97706;
  --bg: #0f1322; --surface: #161c36; --surf2: #1e2647;
  --border: #2a3558; --text: #e8ecf8; --muted: #6e7aa0;
  --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

.header-card { background: var(--surface); padding: 30px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,0.2);}
.coin-val { font-family: 'IBM Plex Mono', monospace; font-size: 42px; font-weight: 700; color: var(--primary); text-shadow: 0 0 15px rgba(245, 158, 11, 0.3); line-height: 1; margin-top: 10px;}

.tabs { display: flex; padding: 20px; gap: 10px; }
.tab { flex: 1; text-align: center; padding: 12px; font-size: 15px; font-weight: 700; color: var(--muted); border-radius: 12px; cursor: pointer; transition: 0.2s; background: var(--surface); border: 1px solid var(--border); }
.tab.active { background: var(--primary); color: #000; border-color: var(--primary); }

.content { flex: 1; padding: 0 20px 20px; overflow-y: auto; }
.hidden { display: none !important; }

/* Product Grid */
.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
.product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #fff; border-bottom: 1px solid var(--border); }
.product-info { padding: 12px; display: flex; flex-direction: column; flex: 1; }
.product-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; flex: 1; }
.product-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; }
.product-price { font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: var(--primary); font-size: 14px;}
.product-stock { color: var(--muted); }
.btn-redeem { width: 100%; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; background: rgba(245, 158, 11, 0.1); color: var(--primary); border: 1px solid rgba(245, 158, 11, 0.3); }
.btn-redeem:active { transform: scale(0.96); }
.btn-redeem.disabled { background: var(--surf2); color: var(--muted); border-color: var(--border); cursor: not-allowed; opacity: 0.7; }

/* History List */
.history-list { display: flex; flex-direction: column; gap: 12px; }
.history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 15px; }
.h-icon { font-size: 24px; }
.h-info { flex: 1; }
.h-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.h-date { font-size: 11px; color: var(--muted); }
.h-status { font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; white-space: nowrap; }
.status-PENDING { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
.status-APPROVED { background: rgba(16, 185, 129, 0.1); color: var(--success); }
.status-REJECTED { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

/* Loaders */
.ov { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
@keyframes spin { to { transform: rotate(360deg); } }

/* 🌟 NEW: Custom Modal CSS (Native Look) */
.ca-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px);}
.ca-ov.active { opacity: 1; pointer-events: auto; }
.ca-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.ca-ov.active .ca-box { transform: scale(1); }
.ca-icon { font-size: 60px; margin-bottom: 15px; line-height: 1; }
.ca-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
.ca-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.ca-btn-group { display: flex; gap: 12px; justify-content: center; }
.ca-btn { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Sarabun'; cursor: pointer; transition: 0.2s; border: none; }
.ca-btn-cancel { background: var(--surf2); border: 1px solid var(--border); color: var(--text); }
.ca-btn-confirm { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
.ca-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <div style="font-weight:700; font-size:14px; color:var(--text);">กำลังโหลดร้านค้า...</div>
</div>

<!-- 🌟 NEW: Custom Modal HTML -->
<div id="custom-alert" class="ca-ov">
  <div class="ca-box">
    <div id="ca-icon" class="ca-icon">⚠️</div>
    <div id="ca-title" class="ca-title">แจ้งเตือน</div>
    <div id="ca-msg" class="ca-msg">ข้อความ</div>
    <div id="ca-btn-group" class="ca-btn-group"></div>
  </div>
</div>

<div class="header-card">
  <div style="font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:1px;">ยอดสะสมของท่าน</div>
  <div class="coin-val" id="ui-balance">0</div>
  <div style="font-size:12px; color:var(--muted); margin-top:8px;">ได้จากการทำข้อสอบและเล่นเกมใน <span class="dynamic-app-name">System</span></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-rewards" onclick="switchTab('rewards')">🎁 ของรางวัล</div>
  <div class="tab" id="tab-history" onclick="switchTab('history')">📜 ประวัติการแลก</div>
</div>

<div class="content" id="content-rewards">
  <div class="product-grid" id="product-list"></div>
</div>

<div class="content hidden" id="content-history">
  <div class="history-list" id="history-list"></div>
</div>

<button style="margin: 0 20px 20px; padding: 14px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-weight: 700; font-family: 'Sarabun'; cursor: pointer;" onclick="liff.closeWindow()">← ปิดหน้าต่าง</button>

<script>
const LIFF_ID = '2009896605-xKJWO7by'; 
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwo_kB4DZSVmYqkztnf8n_-sjVvAFUxIH9dZAqby_SUvV5H8gH5hXhILHkzZJ59S2j6/exec';

let userId = '';
let currentBalance = 0;
let isProcessing = false;

// 🌟 NEW: Custom Modal Functions
function customAlert(msg, title="แจ้งเตือน", icon="⚠️") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `<button class="ca-btn ca-btn-confirm" onclick="closeCustomAlert()">ตกลง</button>`;
  document.getElementById('custom-alert').classList.add('active');
}
function closeCustomAlert() { document.getElementById('custom-alert').classList.remove('active'); }

let confirmCallback = null;
function customConfirm(msg, callback, title="ยืนยัน", icon="❓", btnClass="ca-btn-confirm") {
  document.getElementById('ca-icon').textContent = icon;
  document.getElementById('ca-title').textContent = title;
  document.getElementById('ca-msg').innerHTML = msg;
  document.getElementById('ca-btn-group').innerHTML = `
    <button class="ca-btn ca-btn-cancel" onclick="closeCustomAlert()">ยกเลิก</button>
    <button class="ca-btn ${btnClass}" id="btn-ca-ok">ตกลง</button>
  `;
  confirmCallback = callback;
  document.getElementById('btn-ca-ok').onclick = () => { closeCustomAlert(); if(confirmCallback) confirmCallback(); };
  document.getElementById('custom-alert').classList.add('active');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    const configRes = await callAPI('GET', { action: 'get_config' });
    if(configRes.status === 'ok') { 
      document.querySelectorAll('.dynamic-app-name').forEach(el => el.textContent = configRes.config.appName);
    }
    
    userId = (await liff.getProfile()).userId;
    await fetchData();
  } catch(e) {
    customAlert('Init Error: ' + e.message, 'เกิดข้อผิดพลาด', '❌');
  }
}

async function fetchData() {
  document.getElementById('ov-load').classList.remove('hidden');
  try {
    const res = await callAPI('GET', { action: 'get_store_data', userId: userId });
    if(res.status === 'ok') {
      currentBalance = res.balance || 0;
      document.getElementById('ui-balance').textContent = currentBalance;
      renderProducts(res.rewards || []);
      renderHistory(res.history || []);
    } else { throw new Error(res.message); }
  } catch(e) {
    customAlert(e.message, 'โหลดข้อมูลล้มเหลว', '❌');
  } finally {
    document.getElementById('ov-load').classList.add('hidden');
  }
}

function switchTab(tabId) {
  document.getElementById('tab-rewards').classList.remove('active');
  document.getElementById('tab-history').classList.remove('active');
  document.getElementById('content-rewards').classList.add('hidden');
  document.getElementById('content-history').classList.add('hidden');
  
  document.getElementById('tab-' + tabId).classList.add('active');
  document.getElementById('content-' + tabId).classList.remove('hidden');
}

function renderProducts(products) {
  const list = document.getElementById('product-list'); list.innerHTML = '';
  if(products.length === 0) { list.innerHTML = '<div style="grid-column: span 2; text-align:center; padding: 40px 0; color:var(--muted);">ยังไม่มีสินค้าในขณะนี้</div>'; return; }
  
  products.forEach(p => {
    const canAfford = currentBalance >= p.price;
    const isOut = p.stock <= 0;
    
    let btnHtml = '';
    if(isOut) { btnHtml = `<button class="btn-redeem disabled">สินค้าหมด</button>`; }
    else if(!canAfford) { btnHtml = `<button class="btn-redeem disabled">เหรียญไม่พอ</button>`; }
    else { btnHtml = `<button class="btn-redeem" onclick="redeemReward('${p.id}', '${p.name.replace(/'/g,"\\'")}', ${p.price})">แลก ${p.price} Point</button>`; }
    
    list.innerHTML += `
      <div class="product-card">
        <img src="${p.image}" class="product-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10398/10398492.png'">
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc || 'แลกฟรีที่สวัสดิการ'}</div>
          <div class="product-meta">
            <div class="product-price">🪙 ${p.price}</div>
            <div class="product-stock">เหลือ: ${p.stock}</div>
          </div>
          ${btnHtml}
        </div>
      </div>
    `;
  });
}

function renderHistory(history) {
  const list = document.getElementById('history-list'); list.innerHTML = '';
  if(history.length === 0) { list.innerHTML = '<div style="text-align:center; padding: 40px 0; color:var(--muted);">ยังไม่มีประวัติการแลกรางวัล</div>'; return; }
  
  history.forEach(h => {
    let icon = '📦', statusText = 'รอดำเนินการ';
    if(h.status === 'APPROVED') { icon = '✅'; statusText = 'อนุมัติแล้ว'; }
    else if(h.status === 'REJECTED') { icon = '❌'; statusText = 'ถูกปฏิเสธ (คืนเหรียญ)'; }
    
    list.innerHTML += `
      <div class="history-card">
        <div class="h-icon">${icon}</div>
        <div class="h-info">
          <div class="h-name">${h.rewardName}</div>
          <div class="h-date">${h.timestamp}</div>
        </div>
        <div class="h-status status-${h.status}">${statusText}</div>
      </div>
    `;
  });
}

function redeemReward(id, name, price) {
  if (isProcessing) return;
  
  // 🌟 ใช้ Custom Confirm แทน confirm()
  customConfirm(`ต้องการแลกรางวัล<br><strong style="color:var(--primary)">${name}</strong><br>โดยใช้ <b>${price} Point</b> ใช่หรือไม่?`, async () => {
    isProcessing = true;
    document.getElementById('ov-load').classList.remove('hidden');
    try {
      const res = await callAPI('POST', { action: 'redeem_reward', userId: userId, rewardId: id });
      if(res.status === 'ok') {
        await fetchData();
        switchTab('history');
        // 🌟 ใช้ Custom Alert แทน alert()
        customAlert('ส่งคำขอสำเร็จ รอแอดมินอนุมัติและรับของรางวัลครับ', 'สำเร็จ!', '✅');
      } else {
        customAlert(res.message, 'แลกไม่ได้', '❌');
      }
    } catch(e) {
      customAlert('การเชื่อมต่อขัดข้อง', 'ผิดพลาด', '🔌');
    } finally {
      isProcessing = false;
      document.getElementById('ov-load').classList.add('hidden');
    }
  }, 'ยืนยันการแลกรางวัล', '🎁');
}

async function callAPI(method, params) {
  let url = GAS_URL, opts = { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(params) };
  if(method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts = {method:'GET'}; }
  const resp = await fetch(url, opts);
  return await resp.json();
}

init();
</script>
</body>
</html>
