<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เกมเศรษฐี</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --config-primary: #1e3c72;
  --config-secondary: #ffb300;
  
  --bg-color: #0b0c10;
  --panel-bg: #121826;
  --gold: var(--config-secondary);
  --gold-glow: rgba(255, 179, 0, 0.4);
  --btn-blue: var(--config-primary);
  --border: #4a69bd;
  --text: #ffffff;
  --red: #ff5252;
  --green: #43a047;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg-color); color: var(--text); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

.bg-glow { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); width: 150vw; height: 50vh; background: radial-gradient(ellipse at center, rgba(30,60,114,0.4) 0%, rgba(11,12,16,0) 70%); z-index: -1; pointer-events: none; }
.ov { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; text-align: center; }
.ov.hidden { display: none !important; }
.spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

.start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; width: 100%; max-width: 500px; margin: 0 auto;}
.start-logo { font-size: 80px; margin-bottom: 20px; text-shadow: 0 0 30px var(--gold-glow); }
.start-title { font-size: 36px; font-weight: 800; color: var(--gold); margin-bottom: 10px; line-height: 1.2; }
.start-sub { font-size: 15px; color: #aaa; margin-bottom: 40px; line-height: 1.6; }

.action-btn { background: var(--gold); color: #000; border: none; padding: 16px 32px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; width: 100%; max-width: 320px; font-family: 'Sarabun', sans-serif; transition: 0.2s; }
.action-btn:active { transform: scale(0.96); }
.btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }

.lb-container { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; max-height: 60vh; overflow-y: auto; margin-bottom: 20px; }
.lb-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.lb-item:last-child { border-bottom: none; }
.lb-rank { font-size: 18px; font-weight: 800; color: var(--gold); width: 40px; text-align: left; }
.lb-name { flex: 1; text-align: left; font-size: 15px; color: var(--text); }
.lb-prize { font-size: 17px; font-weight: 800; color: var(--green); font-family: 'IBM Plex Mono', monospace; text-align: right; }

.game-container { max-width: 600px; margin: 0 auto; width: 100%; padding: 20px 16px; flex: 1; display: flex; flex-direction: column; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.timer-box { font-size: 24px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; color: var(--gold); border: 3px solid var(--gold); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold-glow); background: var(--panel-bg); flex-shrink: 0; }
.lifelines { display: flex; gap: 12px; }
.lifeline-btn { background: var(--panel-bg); border: 2px solid var(--gold); color: var(--gold); width: 50px; height: 35px; border-radius: 20px; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.lifeline-btn.used { opacity: 0.3; border-color: #555; color: #555; pointer-events: none; text-decoration: line-through; }
.quit-btn { background: transparent; border: 1px solid var(--border); color: #aaa; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }

.ladder-container { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 20px; display: flex; flex-direction: column-reverse; gap: 4px; height: 180px; overflow-y: hidden; }
.ladder-step { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 4px 8px; color: #888; font-weight: bold; border-radius: 4px; }
.ladder-step.safe { color: var(--text); }
.ladder-step.active { background: var(--gold); color: #000; font-size: 14px; box-shadow: 0 0 10px var(--gold-glow); }
.ladder-step.passed { color: var(--gold); }

.question-box { background: var(--btn-blue); border: 2px solid var(--gold); border-radius: 16px; padding: 24px 20px; text-align: center; font-size: 18px; font-weight: 600; line-height: 1.6; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

.choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 480px) { .choices-grid { grid-template-columns: 1fr; } }
.choice-btn { background: var(--panel-bg); border: 2px solid var(--border); border-radius: 30px; padding: 16px; color: var(--text); font-size: 15px; font-family: 'Sarabun', sans-serif; cursor: pointer; display: flex; align-items: center; transition: all 0.2s; text-align: left; }
.choice-letter { color: var(--gold); font-weight: 800; font-family: 'IBM Plex Mono', monospace; margin-right: 12px; font-size: 16px; }
.choice-text { flex: 1; pointer-events: none; }

.choice-btn.selected { background: var(--gold); border-color: #fff; color: #000; }
.choice-btn.selected .choice-letter { color: #000; }
.choice-btn.correct { background: var(--green); border-color: #fff; color: #fff; }
.choice-btn.correct .choice-letter { color: #fff; }
.choice-btn.wrong { background: var(--red); border-color: #fff; color: #fff; }
.choice-btn.wrong .choice-letter { color: #fff; }
.choice-btn.hidden-choice { visibility: hidden; pointer-events: none; }

.end-screen { text-align: center; padding: 40px 20px; width: 100%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;}
.end-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
.end-prize { font-size: 48px; font-weight: 800; color: var(--gold); font-family: 'IBM Plex Mono', monospace; margin: 20px 0; text-shadow: 0 0 20px var(--gold-glow); }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="ov-load" class="ov">
  <div class="spinner"></div>
  <h2 style="color:var(--gold);">เตรียมข้อมูล...</h2>
</div>

<div id="start-ui" class="ov hidden">
  <div class="start-screen">
    <div class="start-logo">💰</div>
    <div class="start-title">เกมเศรษฐี<br><span class="dynamic-app-name">System</span></div>
    <div class="start-sub">ตอบคำถาม 12 ข้อ เพื่อชิงรางวัลแจ็คพอต!<br>วัดความรู้ ท้าทายความสามารถ</div>
    <button class="action-btn" onclick="startRealGame()" style="margin-bottom:14px;">🎮 เริ่มเล่นเกม</button>
    <button class="action-btn btn-outline" onclick="showLeaderboard()">🏆 ดูทำเนียบเศรษฐี</button>
    <button class="quit-btn" style="margin-top:36px; border:none;" onclick="liff.closeWindow()">← ปิดหน้าต่าง</button>
  </div>
</div>

<div id="lb-ui" class="ov hidden" style="align-items: stretch; padding: 40px 20px;">
  <div class="start-screen" style="justify-content: flex-start; height: auto;">
    <div class="start-title" style="font-size: 28px;">🏆 ทำเนียบเศรษฐี</div>
    <div id="lb-loading" style="color:var(--gold); margin: 20px 0;">กำลังโหลดข้อมูลทำเนียบ...</div>
    <div class="lb-container" id="lb-list" style="display:none;"></div>
    <button class="action-btn btn-outline" style="margin-top: auto;" onclick="closeLeaderboard()">ย้อนกลับ</button>
  </div>
</div>

<div id="game-ui" class="game-container" style="display:none;">
  <div class="header">
    <button class="quit-btn" onclick="quitGame()">🚪 เลิกเล่น</button>
    <div class="timer-box" id="q-timer">60</div> 
    <div class="lifelines">
      <button id="btn-5050" class="lifeline-btn" onclick="useFiftyFifty()">50:50</button>
    </div>
  </div>
  <div class="ladder-container" id="ladder"></div>
  <div class="question-box" id="q-text">คำถามจะแสดงที่นี่?</div>
  <div class="choices-grid">
    <button class="choice-btn" id="btn-A" onclick="selectAnswer('A')"><span class="choice-letter">A:</span><span class="choice-text" id="txt-A">-</span></button>
    <button class="choice-btn" id="btn-B" onclick="selectAnswer('B')"><span class="choice-letter">B:</span><span class="choice-text" id="txt-B">-</span></button>
    <button class="choice-btn" id="btn-C" onclick="selectAnswer('C')"><span class="choice-letter">C:</span><span class="choice-text" id="txt-C">-</span></button>
    <button class="choice-btn" id="btn-D" onclick="selectAnswer('D')"><span class="choice-letter">D:</span><span class="choice-text" id="txt-D">-</span></button>
  </div>
</div>

<div id="end-ui" class="ov hidden">
  <div class="end-screen">
    <div id="end-icon" style="font-size: 80px; margin-bottom: 10px;">🏆</div>
    <div class="end-title" id="end-title">ยินดีด้วย!</div>
    <div style="color:#aaa;">คุณได้รับเงินรางวัลจำลองกลับบ้าน</div>
    <div class="end-prize" id="end-prize">100 <span class="dynamic-term-coin">Point</span></div>
    
    <button class="action-btn" onclick="startRealGame()" style="margin-bottom:12px;">🔄 เล่นใหม่อีกครั้ง</button>
    <button class="action-btn btn-outline" onclick="showLeaderboard()">🏆 ดูทำเนียบ</button>
  </div>
</div>

<script>
const LIFF_ID = 'YOUR-LIFF-GAME-ID';   
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRhVNOnNIAkwZxrTcJOzI2nh_fmSIzI8tgbVurJoUJlDaZrR2Kovo0AydC3Qs0PNyU/exec';

const PRIZES = ['100', '200', '300', '500', '1,000', '2,000', '4,000', '8,000', '15,000', '30,000', '50,000', '100,000'];
let allQs = [], questions = [], currentLevel = 0, isAnswerLocked = false, currentCorrectAnswer = '', userId = '';
let qTimerInterval = null, qTimeLeft = 60;
let appConfig = null;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    const configRes = await callAPI('GET', { action: 'get_config' });
    if(configRes.status === 'ok') { appConfig = configRes.config; applyTemplate(appConfig); }

    userId = (await liff.getProfile()).userId;
    const data = await callAPI('GET', { action:'get_questions', userId: userId });
    if (data.status === 'error') throw new Error(data.message);

    allQs = data.questions || [];
    if (allQs.length < PRIZES.length) throw new Error(`ข้อสอบในระบบมีน้อยกว่า 12 ข้อ`);
    
    document.getElementById('ov-load').classList.add('hidden');
    document.getElementById('start-ui').classList.remove('hidden');
  } catch(e) { document.getElementById('ov-load').innerHTML = `<p style="color:#ff5252">${e.message}</p>`; }
}

function applyTemplate(c) {
  if(!c) return;
  document.documentElement.style.setProperty('--config-primary', c.colorPrimary);
  document.documentElement.style.setProperty('--config-secondary', c.colorSecondary);
  document.querySelectorAll('.dynamic-app-name').forEach(el => el.textContent = c.appName);
  document.querySelectorAll('.dynamic-term-coin').forEach(el => el.textContent = c.termCoin);
}

function startRealGame() {
  document.getElementById('start-ui').classList.add('hidden');
  document.getElementById('end-ui').classList.add('hidden');
  document.getElementById('game-ui').style.display = 'flex';
  questions = allQs.sort(() => Math.random() - 0.5).slice(0, PRIZES.length);
  document.getElementById('btn-5050').classList.remove('used');
  buildLadder(); loadQuestion(0);
}

function buildLadder() {
  const ladder = document.getElementById('ladder'); ladder.innerHTML = '';
  PRIZES.forEach((prize, idx) => {
    const div = document.createElement('div');
    div.className = `ladder-step ${(idx + 1) % 4 === 0 || idx === PRIZES.length - 1 ? 'safe' : ''}`;
    div.id = `step-${idx}`; div.innerHTML = `<span>${idx + 1}</span><span>${prize}</span>`;
    ladder.appendChild(div);
  });
}

function loadQuestion(level) {
  isAnswerLocked = false; currentLevel = level;
  PRIZES.forEach((_, idx) => {
    const el = document.getElementById(`step-${idx}`);
    el.classList.remove('active', 'passed');
    if (idx < currentLevel) el.classList.add('passed');
    if (idx === currentLevel) el.classList.add('active');
  });

  const displayLetters = ['A', 'B', 'C', 'D'];
  displayLetters.forEach(l => {
    const btn = document.getElementById(`btn-${l}`);
    btn.className = 'choice-btn'; btn.style.display = 'none'; 
  });

  const q = questions[level];
  document.getElementById('q-text').textContent = q.questionText;
  currentCorrectAnswer = (q.correctAnswer || '').toUpperCase();
  
  displayLetters.filter(k => q.choices[k]).sort(() => Math.random() - 0.5).forEach((key, index) => {
    const letter = displayLetters[index];
    const btn = document.getElementById(`btn-${letter}`);
    btn.style.display = 'flex'; 
    document.getElementById(`txt-${letter}`).textContent = q.choices[key];
    btn.setAttribute('data-real-key', key);
  });

  clearInterval(qTimerInterval); qTimeLeft = 60; document.getElementById('q-timer').textContent = qTimeLeft;
  qTimerInterval = setInterval(() => {
    qTimeLeft--; document.getElementById('q-timer').textContent = qTimeLeft;
    if (qTimeLeft <= 0) { clearInterval(qTimerInterval); timeIsUp(); }
  }, 1000);
}

function timeIsUp() {
  if (isAnswerLocked) return; isAnswerLocked = true;
  document.getElementById('q-text').innerHTML = `<span style="color:var(--red);">⏰ หมดเวลา!</span><br>` + document.getElementById('q-text').textContent;
  setTimeout(() => endGame(false, false, true), 2000);
}

function selectAnswer(displayLetter) {
  if (isAnswerLocked) return; isAnswerLocked = true; clearInterval(qTimerInterval); 
  const btn = document.getElementById(`btn-${displayLetter}`);
  const realKey = btn.getAttribute('data-real-key');
  btn.classList.add('selected');

  setTimeout(() => {
    btn.classList.remove('selected');
    if (realKey === currentCorrectAnswer) {
      btn.classList.add('correct');
      setTimeout(() => currentLevel === PRIZES.length - 1 ? endGame(true) : loadQuestion(currentLevel + 1), 1500);
    } else {
      btn.classList.add('wrong');
      setTimeout(() => endGame(false), 2000);
    }
  }, 1500);
}

function useFiftyFifty() {
  if (isAnswerLocked) return;
  const btn = document.getElementById('btn-5050');
  if (btn.classList.contains('used')) return; btn.classList.add('used');
  const d = ['A','B','C','D'].filter(l => document.getElementById(`btn-${l}`).style.display !== 'none');
  const w = d.filter(l => document.getElementById(`btn-${l}`).getAttribute('data-real-key') !== currentCorrectAnswer);
  w.sort(() => Math.random() - 0.5).slice(0, 2).forEach(l => document.getElementById(`btn-${l}`).classList.add('hidden-choice'));
}

function quitGame() { if(confirm('เลิกเล่นและรับรางวัลเท่านี้?')) endGame(false, true); }

function endGame(isWin, isQuit = false, isTimeout = false) {
  clearInterval(qTimerInterval); document.getElementById('game-ui').style.display = 'none';
  document.getElementById('end-ui').classList.remove('hidden');

  let prizeIdx = isWin ? PRIZES.length - 1 : isQuit ? currentLevel - 1 : -1;
  if (!isWin && !isQuit) {
    for (let i = currentLevel - 1; i >= 0; i--) if ((i + 1) % 4 === 0) { prizeIdx = i; break; }
  }
  const prizeText = prizeIdx >= 0 ? PRIZES[prizeIdx] : '0';
  const cTerm = appConfig ? appConfig.termCoin : '';

  document.getElementById('end-title').textContent = isWin ? 'อัจฉริยะ!' : isQuit ? 'รับรางวัลกลับบ้าน' : 'ตอบผิด!';
  document.getElementById('end-prize').textContent = `${prizeText} ${cTerm}`;

  if (prizeIdx >= 0) callAPI('POST', { action: 'submit_game_score', userId: userId, prizeIndex: prizeIdx, prizeText: prizeText });
}

async function showLeaderboard() {
  document.getElementById('start-ui').classList.add('hidden'); document.getElementById('end-ui').classList.add('hidden');
  document.getElementById('lb-ui').classList.remove('hidden'); document.getElementById('lb-list').style.display = 'none';
  try {
    const res = await callAPI('GET', { action:'get_game_leaderboard' });
    const cTerm = appConfig ? appConfig.termCoin : '';
    document.getElementById('lb-list').innerHTML = res.leaderboard.map((e,i) => `
      <div class="lb-item"><div class="lb-rank">${i+1}.</div>
      <div class="lb-name"><div>${e.fullName}</div><div style="font-size:11px; color:#888;">${e.rank}</div></div>
      <div class="lb-prize">${e.prizeText} ${cTerm}</div></div>
    `).join('');
    document.getElementById('lb-loading').style.display = 'none'; document.getElementById('lb-list').style.display = 'block';
  } catch(e) {}
}
function closeLeaderboard() { document.getElementById('lb-ui').classList.add('hidden'); document.getElementById('start-ui').classList.remove('hidden'); }

async function callAPI(method, params) {
  let url = GAS_URL, opts = { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(params) };
  if (method === 'GET') { url += '?' + new URLSearchParams(params).toString(); opts = { method: 'GET' }; }
  const resp = await fetch(url, opts); return await resp.json();
}
init();
</script>
</body>
</html>
